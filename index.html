<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ดวงชะตา · ไพ่ทาโรต์ Rider Waite</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Sarabun:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --ink:    #0d0b12;
  --ink2:   #141020;
  --vellum: #f5edd6;
  --aged:   #e8d9b0;
  --gold:   #b8902a;
  --gold2:  #d4a843;
  --gold3:  #f0c96a;
  --crimson:#8b1a1a;
  --crim2:  #a82020;
  --sage:   #2d4a3e;
  --text:   #1a1228;
  --text2:  #5a4e3a;
  --border: rgba(184,144,42,0.3);
  --r: 10px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:'Sarabun',sans-serif;
  background:var(--ink);
  color:var(--vellum);
  min-height:100vh;
  overflow-x:hidden;
}

/* ── NOISE TEXTURE overlay ── */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  opacity:.4;
}

/* ── PARCHMENT bg pattern ── */
.parchment-bg{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 80% 50% at 20% 10%, rgba(184,144,42,.06) 0%, transparent 60%),
    radial-gradient(ellipse 60% 80% at 80% 90%, rgba(139,26,26,.05) 0%, transparent 60%),
    radial-gradient(ellipse 100% 100% at 50% 50%, rgba(45,74,62,.04) 0%, transparent 70%);
}

#root{position:relative;z-index:1;min-height:100vh}

/* ══════════════════════════════
   AUTH PAGE
══════════════════════════════ */
.auth-wrap{
  min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;
}
.auth-box{
  width:100%;max-width:400px;
  background:linear-gradient(160deg,#1a1528 0%,#0f0d18 100%);
  border:1px solid var(--border);border-radius:20px;
  padding:48px 36px;
  box-shadow:0 0 80px rgba(184,144,42,.08),0 0 0 1px rgba(184,144,42,.05);
}
.brand-mark{
  text-align:center;margin-bottom:36px;
}
.brand-moon{
  display:block;font-size:3rem;margin-bottom:10px;
  background:linear-gradient(135deg,var(--gold),var(--gold3));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  filter:drop-shadow(0 0 16px rgba(212,168,67,.4));
  animation:glow 4s ease-in-out infinite alternate;
}
@keyframes glow{from{filter:drop-shadow(0 0 8px rgba(212,168,67,.3))}to{filter:drop-shadow(0 0 24px rgba(212,168,67,.7))}}
.brand-title{
  font-family:'Cinzel Decorative',cursive;
  font-size:1.25rem;line-height:1.4;letter-spacing:.06em;
  background:linear-gradient(135deg,var(--gold),var(--gold3));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.brand-sub{color:var(--text2);font-size:.8rem;margin-top:6px;letter-spacing:.12em;color:#8a7a5a}

.tab-row{display:flex;gap:4px;background:rgba(255,255,255,.04);border-radius:10px;padding:3px;margin-bottom:24px}
.tab{
  flex:1;padding:9px;border:none;background:transparent;
  color:#6a5e48;border-radius:8px;cursor:pointer;
  font-family:'Sarabun',sans-serif;font-size:.9rem;transition:all .25s;
}
.tab.on{background:rgba(184,144,42,.2);color:var(--gold2);border:1px solid rgba(184,144,42,.25)}

.field{
  width:100%;padding:11px 15px;margin-bottom:10px;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(184,144,42,.2);border-radius:8px;
  color:var(--vellum);font-family:'Sarabun',sans-serif;font-size:.95rem;
  transition:border-color .25s;display:block;
}
.field:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(184,144,42,.1)}
.field::placeholder{color:#5a5040}

.act-btn{
  width:100%;padding:13px;margin-top:8px;border:none;border-radius:10px;
  background:linear-gradient(135deg,var(--gold) 0%,var(--gold3) 100%);
  color:var(--ink);font-family:'Cinzel Decorative',cursive;font-size:.85rem;
  cursor:pointer;letter-spacing:.06em;transition:all .3s;font-weight:700;
}
.act-btn:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(184,144,42,.4)}
.err-msg{color:#c05050;font-size:.83rem;text-align:center;margin-top:8px;min-height:1.2em}

/* ══════════════════════════════
   APP SHELL
══════════════════════════════ */
.shell{display:flex;flex-direction:column;min-height:100vh}

.topbar{
  position:sticky;top:0;z-index:200;
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 20px;
  background:rgba(13,11,18,.92);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
}
.topbar-logo{
  font-family:'Cinzel Decorative',cursive;font-size:.95rem;letter-spacing:.06em;
  background:linear-gradient(135deg,var(--gold),var(--gold3));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.topbar-right{display:flex;align-items:center;gap:10px}
.topbar-user{color:#8a7a5a;font-size:.82rem}
.ghost-btn{
  padding:5px 13px;border:1px solid rgba(184,144,42,.25);
  background:transparent;color:#8a7a5a;border-radius:6px;
  cursor:pointer;font-family:'Sarabun',sans-serif;font-size:.8rem;transition:all .25s;
}
.ghost-btn:hover{border-color:var(--gold);color:var(--gold)}

.navbar{
  display:flex;gap:2px;padding:10px 14px;
  background:rgba(10,8,16,.8);border-bottom:1px solid rgba(184,144,42,.12);
  position:sticky;top:53px;z-index:190;
}
.nav{
  flex:1;padding:9px 4px;border:none;background:transparent;
  color:#5a5040;border-radius:7px;cursor:pointer;
  font-family:'Sarabun',sans-serif;font-size:.85rem;transition:all .25s;
}
.nav.on{
  background:rgba(184,144,42,.12);color:var(--gold2);
  border:1px solid rgba(184,144,42,.2);
}

.sec{display:none;animation:fadeIn .35s ease}
.sec.on{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.hidden{display:none!important}

.wrap{max-width:960px;margin:0 auto;padding:28px 16px}

.sec-head{text-align:center;margin-bottom:32px}
.sec-head h2{
  font-family:'Cinzel Decorative',cursive;font-size:1.2rem;letter-spacing:.08em;
  color:var(--gold2);margin-bottom:8px;
}
.sec-head p{color:#8a7a5a;font-size:.9rem}

/* ══════════════════════════════
   FORM CARD
══════════════════════════════ */
.card-panel{
  background:linear-gradient(160deg,rgba(26,21,40,.9),rgba(15,13,24,.95));
  border:1px solid var(--border);border-radius:16px;padding:28px;
  box-shadow:0 4px 40px rgba(0,0,0,.4);
}
.lbl{display:block;color:var(--gold);font-size:.82rem;letter-spacing:.06em;margin-bottom:5px;margin-top:18px}
.lbl:first-child{margin-top:0}
textarea.field{min-height:90px;resize:vertical}

.main-btn{
  display:inline-block;padding:12px 30px;margin-top:18px;border:none;border-radius:10px;
  background:linear-gradient(135deg,var(--gold),var(--gold3));
  color:var(--ink);font-family:'Cinzel Decorative',cursive;font-size:.82rem;font-weight:700;
  cursor:pointer;letter-spacing:.05em;transition:all .3s;
}
.main-btn:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(184,144,42,.4)}
.main-btn.sm{padding:8px 20px;font-size:.78rem;margin-top:10px}
.main-btn.red{background:linear-gradient(135deg,var(--crimson),var(--crim2));color:#f5edd6}

/* ══════════════════════════════
   78-CARD DECK
══════════════════════════════ */
.deck-intro{
  text-align:center;margin-bottom:24px;
  font-family:'Cormorant Garamond',serif;font-size:1rem;font-style:italic;color:#8a7a5a;
}
#deck-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(52px,1fr));
  gap:6px;padding:18px;
  background:rgba(0,0,0,.3);border:1px solid var(--border);border-radius:14px;
  max-height:380px;overflow-y:auto;margin-bottom:20px;
}
.dc{
  height:76px;border-radius:7px;cursor:pointer;position:relative;
  background:linear-gradient(160deg,#1e1535,#0e0b1e);
  border:1px solid rgba(184,144,42,.25);
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;overflow:hidden;
}
.dc::before{
  content:'✦';font-size:.9rem;color:rgba(184,144,42,.3);
  position:absolute;
}
.dc:hover:not(.picked){
  border-color:var(--gold);transform:translateY(-4px) scale(1.06);
  box-shadow:0 8px 20px rgba(184,144,42,.2);
}
.dc::after{
  content:'';position:absolute;inset:0;border-radius:7px;
  background:repeating-linear-gradient(45deg,rgba(184,144,42,.03) 0,rgba(184,144,42,.03) 2px,transparent 2px,transparent 8px);
}
.dc.picked{opacity:.25;cursor:default;transform:none!important}
.dc.highlighted{border-color:var(--gold3);box-shadow:0 0 12px rgba(212,168,67,.5)}

/* ── SELECTED SLOTS ── */
.slots-row{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;margin-top:16px}
.slot{
  flex:1;min-width:140px;max-width:200px;
  background:rgba(0,0,0,.3);border:1px dashed rgba(184,144,42,.25);
  border-radius:12px;padding:14px;text-align:center;
  transition:border-color .3s;
}
.slot.filled{border-color:var(--gold);border-style:solid}
.slot-pos{
  font-family:'Cinzel Decorative',cursive;font-size:.65rem;letter-spacing:.1em;
  color:var(--gold);margin-bottom:10px;
}
.slot-img-wrap{
  position:relative;border-radius:8px;overflow:hidden;
  border:2px solid rgba(184,144,42,.4);margin:0 auto 8px;
  max-width:100px;
}
.slot-img-wrap img{width:100%;display:block;transition:transform .3s}
.slot-img-wrap.rev img{transform:rotate(180deg)}
.slot-name{font-size:.78rem;color:var(--vellum);margin-bottom:3px}
.slot-orient{font-size:.7rem;color:#8a7a5a}

/* ── CARD FLIP MODAL ── */
.card-modal-bg{
  position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:500;
  display:flex;align-items:center;justify-content:center;padding:20px;
  backdrop-filter:blur(6px);animation:fadeIn .2s ease;
}
.card-modal{
  background:linear-gradient(160deg,#1e1a30,#0f0d1e);
  border:1px solid var(--border);border-radius:18px;
  max-width:480px;width:100%;padding:28px;
  box-shadow:0 0 80px rgba(184,144,42,.12);
  max-height:92vh;overflow-y:auto;
}
.cm-img-wrap{
  max-width:180px;margin:0 auto 16px;
  border-radius:10px;overflow:hidden;
  border:2px solid var(--gold);
  box-shadow:0 0 30px rgba(184,144,42,.2);
}
.cm-img-wrap.rev img{transform:rotate(180deg)}
.cm-img-wrap img{width:100%;display:block}
.cm-name{font-family:'Cinzel Decorative',cursive;font-size:1rem;color:var(--gold2);text-align:center;margin-bottom:4px}
.cm-orient{text-align:center;font-size:.8rem;color:#8a7a5a;margin-bottom:12px}
.cm-desc{
  font-family:'Cormorant Garamond',serif;font-size:.95rem;font-style:italic;
  color:#b0a080;text-align:center;margin-bottom:18px;line-height:1.6;
  padding-bottom:16px;border-bottom:1px solid rgba(184,144,42,.2);
}
.meaning-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.mg-cell{background:rgba(255,255,255,.04);border-radius:8px;padding:12px}
.mg-cell .m-ico{font-size:1.1rem;margin-bottom:5px;display:block}
.mg-cell .m-lbl{font-size:.7rem;color:var(--gold);letter-spacing:.05em;margin-bottom:4px;display:block}
.mg-cell .m-val{font-size:.82rem;color:#c8b888;line-height:1.5}
.cm-close{
  display:block;width:100%;padding:10px;margin-top:6px;
  border:1px solid rgba(184,144,42,.3);background:transparent;
  color:#8a7a5a;border-radius:8px;cursor:pointer;
  font-family:'Sarabun',sans-serif;font-size:.85rem;transition:all .25s;
}
.cm-close:hover{border-color:var(--gold);color:var(--gold)}

/* ══════════════════════════════
   HISTORY
══════════════════════════════ */
.hist-list{display:flex;flex-direction:column;gap:10px}
.hist-item{
  background:rgba(26,21,40,.7);border:1px solid var(--border);border-radius:12px;
  padding:16px;cursor:pointer;transition:all .25s;
}
.hist-item:hover{border-color:var(--gold);transform:translateY(-2px);box-shadow:0 6px 24px rgba(184,144,42,.1)}
.hist-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.hist-date{font-size:.78rem;color:#6a5e48}
.badge{font-size:.72rem;padding:3px 10px;border-radius:20px}
.badge.pending{background:rgba(184,144,42,.12);color:var(--gold)}
.badge.answered{background:rgba(50,120,70,.15);color:#6dba8a}
.badge.read{background:rgba(80,60,130,.2);color:#9a7fd4}
.hist-q{font-size:.9rem;color:var(--vellum);margin-bottom:8px;font-style:italic}
.chip-row{display:flex;flex-wrap:wrap;gap:5px}
.chip{font-size:.7rem;padding:2px 9px;border-radius:14px;background:rgba(184,144,42,.1);border:1px solid rgba(184,144,42,.25);color:#b0a060}
.chip.rev{background:rgba(139,26,26,.12);border-color:rgba(139,26,26,.3);color:#c08080}

/* ══════════════════════════════
   READING DETAIL MODAL
══════════════════════════════ */
.modal-bg{
  position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:400;
  display:flex;align-items:flex-start;justify-content:center;
  padding:20px;overflow-y:auto;backdrop-filter:blur(5px);animation:fadeIn .25s ease;
}
.modal{
  background:linear-gradient(160deg,#1c1830,#0e0c1c);
  border:1px solid var(--border);border-radius:20px;
  width:100%;max-width:820px;padding:32px;
  position:relative;margin:auto;
}
.modal-x{
  position:absolute;top:14px;right:14px;
  background:rgba(255,255,255,.06);border:1px solid var(--border);
  color:#6a5e48;width:30px;height:30px;border-radius:50%;
  cursor:pointer;font-size:.85rem;display:flex;align-items:center;justify-content:center;
  transition:all .2s;
}
.modal-x:hover{color:var(--gold);border-color:var(--gold)}
.modal-title{font-family:'Cinzel Decorative',cursive;font-size:1.15rem;color:var(--gold2);margin-bottom:20px}
.meta-box{background:rgba(0,0,0,.25);border-radius:10px;padding:16px;margin-bottom:22px}
.meta-box p{font-size:.87rem;color:#c8b888;margin-bottom:5px}
.meta-box p:last-child{margin:0}
.meta-box strong{color:var(--gold2)}

.spread-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:14px;margin-bottom:22px}
.spread-card{
  background:rgba(255,255,255,.03);border:1px solid var(--border);
  border-radius:13px;padding:18px;
}
.sp-pos{font-family:'Cinzel Decorative',cursive;font-size:.6rem;color:var(--gold);letter-spacing:.1em;text-align:center;margin-bottom:10px}
.sp-img{max-width:120px;margin:0 auto 10px;border-radius:8px;overflow:hidden;border:2px solid rgba(184,144,42,.35)}
.sp-img.rev img{transform:rotate(180deg)}
.sp-img img{width:100%;display:block}
.sp-cname{font-family:'Cinzel Decorative',cursive;font-size:.7rem;color:var(--gold2);text-align:center;margin-bottom:3px}
.sp-orient{text-align:center;font-size:.72rem;color:#8a7a5a;margin-bottom:10px}
.sp-desc{font-size:.78rem;color:#9a8a6a;font-style:italic;margin-bottom:10px;line-height:1.5;text-align:center}
.sp-divider{border:none;border-top:1px solid rgba(184,144,42,.15);margin:10px 0}
.sp-row{display:flex;gap:8px;align-items:flex-start;margin-bottom:7px}
.sp-ico{font-size:.9rem;flex-shrink:0;margin-top:1px}
.sp-row strong{font-size:.72rem;color:var(--gold);display:block;margin-bottom:1px}
.sp-row span{font-size:.78rem;color:#b0a080;line-height:1.45}

.pred-box{
  background:linear-gradient(135deg,rgba(45,74,62,.15),rgba(20,16,40,.2));
  border:1px solid rgba(45,74,62,.4);border-radius:13px;padding:22px;margin-bottom:18px;
}
.pred-box h3{font-family:'Cinzel Decorative',cursive;font-size:.9rem;color:#6dba8a;margin-bottom:14px}
.pred-text{color:var(--vellum);font-size:.92rem;line-height:1.85;white-space:pre-line}

.wait-box{text-align:center;padding:30px}
.wait-box .wi{font-size:2.5rem;animation:pulse 2.5s ease-in-out infinite;display:block;margin-bottom:10px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.wait-box p{color:#8a7a5a;font-size:.9rem}

.rate-block{margin-top:18px}
.rate-block h3{font-family:'Cinzel Decorative',cursive;font-size:.85rem;color:var(--gold);margin-bottom:12px}
.stars-row{display:flex;gap:6px;margin-bottom:14px}
.star-btn{font-size:1.8rem;cursor:pointer;color:var(--gold);transition:transform .15s;background:none;border:none;padding:0}
.star-btn:hover{transform:scale(1.25)}
.star-btn.lit{color:var(--gold3)}

.donate-box{
  margin-top:22px;text-align:center;
  background:rgba(184,144,42,.04);border:1px solid rgba(184,144,42,.18);
  border-radius:14px;padding:22px;
}
.donate-box h4{font-family:'Cinzel Decorative',cursive;font-size:.8rem;color:var(--gold);margin-bottom:6px}
.donate-box p{font-size:.82rem;color:#8a7a5a;margin-bottom:14px}
.qr-wrap img{max-width:200px;border-radius:10px;border:2px solid var(--gold)}
.qr-fallback{
  display:inline-block;background:rgba(184,144,42,.08);border:1px solid var(--border);
  border-radius:10px;padding:16px 24px;
}
.qr-fallback p{color:var(--gold2);font-size:.85rem;margin-bottom:4px}
.qr-fallback small{color:#8a7a5a;font-size:.75rem}

/* ══════════════════════════════
   REVIEWS
══════════════════════════════ */
.rev-form{background:rgba(26,21,40,.7);border:1px solid var(--border);border-radius:14px;padding:22px;margin-bottom:22px}
.rev-form h3{font-family:'Cinzel Decorative',cursive;font-size:.85rem;color:var(--gold);margin-bottom:14px}
.anon-line{font-size:.85rem;color:#8a7a5a;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.star-pick{display:flex;align-items:center;gap:8px;margin:10px 0 14px}
.star-pick span{font-size:.82rem;color:#8a7a5a}
.sp-star{font-size:1.6rem;cursor:pointer;color:var(--gold);background:none;border:none;padding:0;transition:transform .15s}
.sp-star:hover{transform:scale(1.2)}
.sp-star.lit{color:var(--gold3)}

.rev-card{background:rgba(26,21,40,.7);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:10px}
.rev-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.rev-name{color:var(--gold2);font-size:.85rem;font-weight:600}
.rev-stars{color:var(--gold);font-size:.95rem;letter-spacing:1px}
.rev-text{color:#c8b888;font-size:.87rem;line-height:1.65;margin-bottom:5px;font-style:italic}
.rev-date{font-size:.75rem;color:#5a5040}

/* ══════════════════════════════
   HOST DASHBOARD
══════════════════════════════ */
.host-reading{
  background:rgba(20,16,30,.8);border:1px solid var(--border);
  border-radius:15px;padding:22px;margin-bottom:14px;
}
.hr-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.hr-name{font-size:.95rem;color:var(--gold2);font-weight:600}
.hr-email{font-size:.78rem;color:#6a5e48;display:block}
.hr-date{font-size:.75rem;color:#5a5040}
.hr-dob{font-size:.8rem;color:#8a7a5a;margin-bottom:8px}
.hr-q{
  font-style:italic;color:var(--vellum);font-size:.9rem;
  padding:10px 14px;background:rgba(0,0,0,.25);
  border-left:3px solid var(--gold);border-radius:4px;margin-bottom:14px;
}
.hr-cards{display:flex;gap:12px;overflow-x:auto;padding:4px 0 12px}
.hr-card{flex-shrink:0;width:100px;text-align:center}
.hr-card-pos{font-size:.65rem;color:var(--gold);font-family:'Cinzel Decorative',cursive;margin-bottom:5px}
.hr-card-img{border-radius:6px;overflow:hidden;border:1px solid rgba(184,144,42,.3)}

══════════════════════════════ */

// สร้าง Minor Arcana 56 ใบ
function buildMinorArcana() {
  const cards = [];
  SUITS.forEach(suit => {
    PIPS.forEach(pip => {
      const upMeaning  = minorMeaning(suit.key, true);
      const revMeaning = minorMeaning(suit.key, false);
      cards.push({
        id: `${suit.key}_${pip.n}`,
        name: `${pip.th}แห่ง${suit.nameTH}`,
        nameTH: `${pip.th}แห่ง${suit.nameTH}`,
        img: `https://sacred-texts.com/tarot/pkt/img/${suit.key}${String(pip.n).padStart(2,'0')}.jpg`,
        desc: `${pip.th}แห่ง${suit.nameTH} · ${suit.element}`,
        upright:  { general: pip.up,  love: upMeaning.love,  work: upMeaning.work,  money: upMeaning.money,  family: upMeaning.family },
        reversed: { general: pip.rev, love: revMeaning.love, work: revMeaning.work, money: revMeaning.money, family: revMeaning.family },
      });
    });
    COURT.forEach(c => {
      const upMeaning  = minorMeaning(suit.key, true);
      const revMeaning = minorMeaning(suit.key, false);
      cards.push({
        id: `${suit.key}_${c.rank}`,
        name: `${c.rankTH}แห่ง${suit.nameTH}`,
        nameTH: `${c.rankTH}แห่ง${suit.nameTH}`,
        img: `https://sacred-texts.com/tarot/pkt/img/${suit.key}${c.rank.toLowerCase()}.jpg`,
        desc: `${c.rankTH}แห่ง${suit.nameTH} · ${suit.element}`,
        upright:  { general: c.up,  love: upMeaning.love,  work: upMeaning.work,  money: upMeaning.money,  family: upMeaning.family },
        reversed: { general: c.rev, love: revMeaning.love, work: revMeaning.work, money: revMeaning.money, family: revMeaning.family },
      });
    });
  });
  return cards;
}

// API HELPERS
// ══════════════════════════════════════════════════════
async function api(params) {
  const isGet = params.method === "GET";
  let url = GAS_URL;
  if (isGet) {
    const q = new URLSearchParams(params);
    delete q.method;
    url += "?" + q.toString();
    const r = await fetch(url);
    return r.json();
  }
  const r = await fetch(GAS_URL, {
    method:"POST",
    body: JSON.stringify(params),
  });
  return r.json();
}

window.switchTab = t => {
  document.querySelectorAll(".tab").forEach(b => b.classList.remove("on"));
  document.querySelectorAll(".tab")[t==="login"?0:1].classList.add("on");
  document.getElementById("login-f").classList.toggle("hidden", t!=="login");
  document.getElementById("reg-f").classList.toggle("hidden", t!=="reg");
};
window.doLogin = async () => {
  const email = document.getElementById("l-email").value.trim();
  const password = document.getElementById("l-pass").value;
  if (!email||!password) { setErr("กรุณากรอกให้ครบ"); return; }
  setErr("กำลังเข้าสู่ระบบ...");
  const r = await api({ action:"login", email, password });
  if (r.error) { setErr(r.error); return; }
  saveSession(r.user); render();
};
window.doRegister = async () => {
  const displayName = document.getElementById("r-name").value.trim();
  const email       = document.getElementById("r-email").value.trim();
  const password    = document.getElementById("r-pass").value;
  if (!displayName||!email||!password) { setErr("กรุณากรอกให้ครบ"); return; }
  if (password.length < 6) { setErr("รหัสผ่านต้องมีอย่างน้อย 6 ตัวอักษร"); return; }
  setErr("กำลังสมัคร...");
  const r = await api({ action:"register", email, password, displayName });
  if (r.error) { setErr(r.error); return; }
  saveSession(r.user); render();
};
function setErr(m) { const el=document.getElementById("a-err"); if(el) el.textContent=m; }

// ── DECK ────────────────────────────────────────────
function buildDeck() {
  deck = ALL_CARDS.map(c => ({ ...c, reversed: Math.random() < 0.5 }))
                  .sort(() => Math.random() - 0.5);
  selectedCards = [];
  renderDeckGrid();
}

function renderDeckGrid() {
  const g = document.getElementById("deck-grid");
  if (!g) return;
  g.innerHTML = deck.map((c,i) => `
    <div class="dc ${selectedCards.find(s=>s.id===c.id)?"picked":""}" 
         title="${c.nameTH}" onclick="peekCard(${i})"></div>
  `).join("");
}

window.peekCard = idx => {
  const c = deck[idx];
  const alreadyPicked = !!selectedCards.find(s => s.id === c.id);
  const canPick = selectedCards.length < 3 && !alreadyPicked;
  const m = c.reversed ? c.reversed_data || c.reversed : c.reversed;
  const meaning = typeof m === "object" ? m : (c.reversed ? c.reversed : c.upright);
  const data = c.reversed ? c.reversed : c.upright;
  // ตรวจว่า reversed คือ object หรือ boolean
  const uprightData = c.upright;
  const revData     = c.reversed; // อาจเป็น boolean ในบางกรณี — แต่เราเก็บ reversed:bool แยก
  // แก้ไข: เราเก็บ reversed:bool ใน deck item, ส่วน c.upright / c.reversed (object) มาจาก ALL_CARDS
  const cardData = ALL_CARDS.find(x => x.id === c.id);
  const orient = c.reversed; // boolean
  const meaningData = orient ? cardData.reversed : cardData.upright;

  document.body.insertAdjacentHTML("beforeend", `
  <div class="card-modal-bg" id="peek-modal" onclick="if(event.target===this)closePeek()">
    <div class="card-modal">
      <div class="cm-img-wrap ${orient?"rev":""}">
        <img src="${cardData.img}" alt="${cardData.nameTH}" 
             onerror="this.parentElement.innerHTML='<div style=padding:20px;color:var(--gold);text-align:center;font-size:.8rem>${cardData.nameTH}</div>'">
      </div>
      <div class="cm-name">${cardData.nameTH}</div>
      <div class="cm-orient">${orient?"🔄 กลับหัว — ความหมายกลับด้าน":"↑ ตั้ง — ความหมายปกติ"}</div>
      <div class="cm-desc">${cardData.desc}</div>
      <div class="meaning-grid">
        <div class="mg-cell"><span class="m-ico">❤️</span><span class="m-lbl">ความรัก</span><div class="m-val">${meaningData.love}</div></div>
        <div class="mg-cell"><span class="m-ico">💼</span><span class="m-lbl">การงาน</span><div class="m-val">${meaningData.work}</div></div>
        <div class="mg-cell"><span class="m-ico">💰</span><span class="m-lbl">การเงิน</span><div class="m-val">${meaningData.money}</div></div>
        <div class="mg-cell"><span class="m-ico">👨‍👩‍👧</span><span class="m-lbl">ครอบครัว</span><div class="m-val">${meaningData.family}</div></div>
      </div>
      ${canPick
        ? `<button class="main-btn" style="width:100%;text-align:center;margin-top:0" onclick="pickCard(${idx});closePeek()">✦ เลือกไพ่ใบนี้ ✦</button>`
        : alreadyPicked
          ? `<div style="text-align:center;color:var(--gold);font-size:.85rem;padding:10px">✓ เลือกไพ่ใบนี้แล้ว</div>`
          : `<div style="text-align:center;color:#8a7a5a;font-size:.85rem;padding:10px">เลือกครบ 3 ใบแล้ว</div>`
      }
      <button class="cm-close" onclick="closePeek()">ปิด</button>
    </div>
  </div>`);
};
window.closePeek = () => { document.getElementById("peek-modal")?.remove(); };

window.pickCard = idx => {
  if (selectedCards.length >= 3) return;
  const c = deck[idx];
  if (selectedCards.find(s => s.id === c.id)) return;
  selectedCards.push(c);
  const left = 3 - selectedCards.length;
  document.getElementById("left-lbl").textContent = left;
  renderDeckGrid();
  renderSlots();
  if (selectedCards.length === 3) {
    document.getElementById("submit-area").classList.remove("hidden");
  }
};

function renderSlots() {
  const positions = ["อดีต · รากเหง้า","ปัจจุบัน · แก่นกลาง","อนาคต · ผลลัพธ์"];
  [0,1,2].forEach(i => {
    const slot = document.getElementById("slot-"+i);
    if (!slot) return;
    const c = selectedCards[i];
    if (!c) {
      slot.classList.remove("filled");
      slot.innerHTML = `<div class="slot-pos">${positions[i]}</div><div style="color:#3a3028;font-size:.75rem;margin-top:20px">ยังไม่ได้เลือก</div>`;
      return;
    }
    const cardData = ALL_CARDS.find(x => x.id === c.id);
    slot.classList.add("filled");
    slot.innerHTML = `
      <div class="slot-pos">${positions[i]}</div>
      <div class="slot-img-wrap ${c.reversed?"rev":""}">
        <img src="${cardData.img}" alt="${cardData.nameTH}" 
             onerror="this.parentElement.innerHTML='<div style=padding:8px;font-size:.65rem;color:var(--gold);text-align:center>${cardData.nameTH}</div>'">
      </div>
      <div class="slot-name">${cardData.nameTH}</div>
      <div class="slot-orient">${c.reversed?"🔄 กลับหัว":"↑ ตั้ง"}</div>`;
  });
}

window.startPick = () => {
  const name = document.getElementById("f-name").value.trim();
  const dob  = document.getElementById("f-dob").value;
  const q    = document.getElementById("f-q").value.trim();
  if (!name||!dob||!q) { alert("กรุณากรอกข้อมูลให้ครบทุกช่อง"); return; }
  readingMeta = { name, dob, question: q };
  document.getElementById("form-area").classList.add("hidden");
  document.getElementById("pick-area").classList.remove("hidden");
  buildDeck();
};

window.submitReading = async () => {
  if (selectedCards.length < 3) { alert("กรุณาเลือกไพ่ครบ 3 ใบ"); return; }
  const cards = selectedCards.map(c => {
    const cd = ALL_CARDS.find(x => x.id === c.id);
    return { id: c.id, name: cd.name, nameTH: cd.nameTH, img: cd.img, reversed: c.reversed };
  });
  const r = await api({
    action: "submitReading",
    uid: session.uid,
    email: session.email,
    displayName: readingMeta.name,
    dob: readingMeta.dob,
    question: readingMeta.question,
    cards,
  });
  if (r.error) { alert("เกิดข้อผิดพลาด: "+r.error); return; }
  document.getElementById("pick-area").classList.add("hidden");
  document.getElementById("sent-area").classList.remove("hidden");
};

}

    <div class="hr-top">
      <div><span class="hr-name">${rd.displayName}</span><span class="hr-email">${rd.email}</span></div>
      <span class="hr-date">${fmtDate(rd.createdAt)}</span>
    </div>
    <div class="hr-dob">📅 เกิด: ${rd.dob}</div>
    <div class="hr-q">"${rd.question}"</div>
    <div class="hr-cards">
      ${(rd.cards||[]).map((c,i)=>`
        <div class="hr-card">
          <div class="hr-card-pos">${positions[i]}</div>
          <div class="hr-card-img ${c.reversed?"rev":""}">
            <img src="${c.img}" alt="${c.nameTH}"
                 onerror="this.parentElement.innerHTML='<div style=padding:6px;font-size:.6rem;color:var(--gold);text-align:center>${c.nameTH}</div>'"
                 style="width:100%;display:block">
          </div>
          <div class="hr-card-name">${c.nameTH}</div>
          <div class="hr-card-orient">${c.reversed?"🔄 กลับหัว":"↑ ตั้ง"}</div>
        </div>`).join("")}
    </div>
    ${isPend
      ? `<div class="compose-area">
           <label class="lbl">✍️ เขียนคำทำนาย</label>
           <textarea class="field" id="pred-${rd.id}" rows="7" placeholder="เขียนคำทำนายสำหรับ ${rd.displayName}..."></textarea>
           <button class="main-btn sm" onclick="sendPred('${rd.id}')">📨 ส่งคำทำนาย</button>
         </div>`
      : `<div class="ans-box">
           <strong>คำทำนายที่ส่งไป</strong>
           <p>${rd.prediction||""}</p>
           ${rd.userRating?`<div class="fb-row">คะแนน: <span class="fb-stars">${"★".repeat(rd.userRating)+"☆".repeat(5-rd.userRating)}</span></div>`:""}
           ${rd.userComment?`<div class="fb-row comment-q">"${rd.userComment}"</div>`:""}
         </div>`
    }
  </div>`;

  const pEl = document.getElementById("pend-list");
  const dEl = document.getElementById("done-list");
  pEl.innerHTML = pending.length  ? pending.map(x=>renderHostCard(x,true)).join("")  : '<div class="empty-msg">ไม่มีคำขอที่รอ 🎉</div>';
  dEl.innerHTML = answered.length ? answered.map(x=>renderHostCard(x,false)).join("") : '<div class="empty-msg">ยังไม่มีคำทำนาย</div>';
}

window.sendPred = async id => {
  const text = document.getElementById("pred-"+id)?.value.trim();
  if (!text) { alert("กรุณาเขียนคำทำนายก่อน"); return; }
  const r = await api({ action:"sendPrediction", hostEmail:HOST_EMAIL, readingId:id, prediction:text });
  if (r.error) { alert("เกิดข้อผิดพลาด: "+r.error); return; }
  alert("ส่งคำทำนายสำเร็จ!");
  loadHostData();
};

async function loadHostReviews() {
  const el = document.getElementById("hrev-list");
  if (!el) return;
  const r = await api({ method:"GET", action:"getReviews" });
  if (!r.reviews?.length) { el.innerHTML='<div class="empty-msg">ยังไม่มีรีวิว</div>'; return; }
  const labels=["","★","★★","★★★","★★★★","★★★★★"];
  el.innerHTML = r.reviews.map(rv=>`
    <div class="rev-card">
      <div class="rev-top">
        <span class="rev-name">${rv.displayName}${rv.isAnon?` <em style="color:#5a5040;font-size:.75rem">(${rv.email||""})</em>`:""}</span>
        <span class="rev-stars">${labels[rv.rating]||""}</span>
      </div>
      <div class="rev-text">"${rv.text}"</div>
      <div class="rev-date">${fmtDate(rv.createdAt)}</div>
    </div>`).join("");
}

// ── UTILS ────────────────────────────────────────────
function fmtDate(s) {
  if (!s) return "";
  try { return new Date(s).toLocaleDateString("th-TH",{year:"numeric",month:"short",day:"numeric"}); }
  catch(_) { return s; }
}

// ── BOOT ────────────────────────────────────────────
render();
</script>
</body>
</html>
